<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel NFS-e — Contourline</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #09090b; --surface: #18181b; --surface2: #27272a;
    --border: #3f3f46; --text: #fafafa; --muted: #a1a1aa; --faint: #52525b;
    --green: #22c55e; --green-bg: #052e16; --green-dim: #166534;
    --blue: #3b82f6; --red: #ef4444;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }

  /* Login */
  .login-overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px;
  }
  .login-box {
    width: 100%; max-width: 380px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px;
    display: flex; flex-direction: column; gap: 18px;
  }
  .login-logo { display: flex; align-items: center; gap: 12px; }
  .login-logo-mark { width: 40px; height: 40px; background: var(--green); border-radius: 10px; display: grid; place-items: center; font-size: 20px; }
  .login-title { font-size: 20px; font-weight: 700; }
  .login-sub { font-size: 13px; color: var(--muted); }
  .input-group { display: flex; flex-direction: column; gap: 6px; }
  .input-label { font-size: 12px; color: var(--muted); font-weight: 500; }
  .input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; color: var(--text); font-size: 15px; outline: none; transition: border-color 0.15s; width: 100%; }
  .input:focus { border-color: var(--green); }
  .login-btn { padding: 13px; background: var(--green); color: #000; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .login-btn:hover { background: #16a34a; }
  .login-error { color: var(--red); font-size: 12px; text-align: center; display: none; }

  /* App */
  .app { display: none; flex-direction: column; height: 100vh; }

  /* Header */
  .header {
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg); position: sticky; top: 0; z-index: 10;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-logo { width: 32px; height: 32px; background: var(--green); border-radius: 8px; display: grid; place-items: center; font-size: 16px; }
  .header-title { font-size: 16px; font-weight: 700; }
  .header-sub { font-size: 12px; color: var(--muted); }
  .header-right { display: flex; align-items: center; gap: 10px; }

  .pill {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; padding: 5px 12px;
    border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted);
  }
  .pill.ok { border-color: var(--green-dim); background: var(--green-bg); color: var(--green); }
  .pill-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .pill-dot.pulse { animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Empty */
  .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--faint); text-align: center; padding: 40px; }
  .empty-icon { font-size: 56px; opacity: 0.3; }
  .empty-title { font-size: 16px; font-weight: 600; }
  .empty-sub { font-size: 13px; line-height: 1.6; }

  /* List */
  .list { flex: 1; overflow-y: auto; padding: 16px 24px; display: flex; flex-direction: column; gap: 10px; }

  /* Card */
  .nota-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
    animation: slideIn 0.3s ease;
  }
  .nota-card.new { border-color: var(--green-dim); }
  @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }

  .nota-header {
    padding: 10px 16px; background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .nota-header-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .nota-num { font-size: 13px; font-weight: 700; color: var(--green); white-space: nowrap; }
  .nota-prestador { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .nota-valor { font-size: 12px; color: var(--muted); white-space: nowrap; }

  .nota-body { padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
  .chave-text {
    font-family: monospace; font-size: 13px; color: var(--text);
    word-break: break-all; flex: 1; line-height: 1.5;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 10px 12px;
  }
  .copy-btn {
    padding: 10px 18px; background: var(--green); color: #000;
    border: none; border-radius: 8px; font-size: 13px; font-weight: 700;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    display: flex; align-items: center; gap: 6px; transition: all 0.15s;
  }
  .copy-btn:hover { background: #16a34a; }
  .copy-btn.copied { background: var(--blue); color: #fff; }

  .nota-footer {
    padding: 7px 16px; border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; color: var(--faint);
  }
  .usuario-tag { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 11px; color: var(--muted); }
  .new-badge { background: var(--green-bg); border: 1px solid var(--green-dim); border-radius: 4px; padding: 2px 8px; font-size: 10px; font-weight: 700; color: var(--green); }

  /* Toast */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(12px); background: var(--text); color: var(--bg); font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: 8px; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 200; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Login -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-mark">📄</div>
      <div>
        <div class="login-title">Painel NFS-e</div>
        <div class="login-sub">Contourline — Fiscal</div>
      </div>
    </div>
    <div class="input-group">
      <div class="input-label">Senha de acesso</div>
      <input class="input" id="senhaInput" type="password" placeholder="••••••" autofocus>
    </div>
    <button class="login-btn" onclick="fazerLogin()">Entrar</button>
    <div class="login-error" id="loginError">Senha incorreta</div>
  </div>
</div>

<!-- App -->
<div class="app" id="app">
  <div class="header">
    <div class="header-left">
      <div class="header-logo">📄</div>
      <div>
        <div class="header-title">Painel NFS-e</div>
        <div class="header-sub">Contourline — atualização automática</div>
      </div>
    </div>
    <div class="header-right">
      <div class="pill" id="countPill">0 notas</div>
      <div class="pill" id="syncPill">
        <div class="pill-dot" id="syncDot"></div>
        <span id="syncText">conectando...</span>
      </div>
    </div>
  </div>

  <div class="empty" id="emptyState">
    <div class="empty-icon">📭</div>
    <div class="empty-title">Aguardando notas</div>
    <div class="empty-sub">Escaneie um QR code pelo celular<br>a chave aparece aqui automaticamente</div>
  </div>

  <div class="list" id="noteList" style="display:none;"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────
const SENHA      = 'contourline2024';
const SHEET_ID   = '1330tKi9srogL71KVphJlTYuh-CUFjRX71LBuEZf8CIY';
const SHEET_NAME = 'NFS-e';
const INTERVALO  = 5000; // ms — verifica a cada 5 segundos
// ─────────────────────────────────────────────────────

let notas = [], ultimoId = null, intervaloAtivo = null;

// ── LOGIN ─────────────────────────────────────────────
function fazerLogin() {
  if (document.getElementById('senhaInput').value === SENHA) {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    buscarNotas();
    intervaloAtivo = setInterval(buscarNotas, INTERVALO);
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
document.getElementById('senhaInput').addEventListener('keydown', e => { if (e.key === 'Enter') fazerLogin(); });

// ── FETCH SHEETS ──────────────────────────────────────
async function buscarNotas() {
  setSyncStatus('sincronizando...', false);
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
    const resp = await fetch(url);
    const text = await resp.text();

    // A API do Sheets retorna um JSON embrulhado em callback — precisa limpar
    const json = JSON.parse(text.replace(/^[^\{]+/, '').replace(/[^\}]+$/, ''));
    const rows = json.table?.rows || [];

    if (rows.length === 0) { setSyncStatus('ao vivo', true); return; }

    // Converte rows em objetos (ignora cabeçalho linha 0 se for texto)
    const parsed = rows.map(r => ({
      numero:    r.c[0]?.v || '—',
      data_em:   r.c[1]?.v || '—',
      prestador: r.c[2]?.v || '—',
      cnpj:      r.c[3]?.v || '—',
      valor:     r.c[4]?.v || '—',
      descricao: r.c[5]?.v || '—',
      chave:     r.c[6]?.v || '—',
      usuario:   r.c[7]?.v || '—',
      timestamp: r.c[8]?.v || '',
      id:        String(r.c[0]?.v) + String(r.c[1]?.v) // id único por nota
    })).filter(n => n.numero !== 'Nº NFS-e' && n.numero !== '—'); // remove cabeçalho e vazios

    // Inverte pra mostrar mais recente primeiro
    parsed.reverse();

    // Verifica se chegou nota nova
    const novoId = parsed[0]?.id;
    const temNova = ultimoId !== null && novoId !== ultimoId;
    ultimoId = novoId;

    notas = parsed;
    renderNotas(temNova);
    setSyncStatus('ao vivo', true);

    if (temNova) {
      showToast(`✓ Nova nota: ${parsed[0].prestador.split(' ').slice(0,2).join(' ')}`);
    }

  } catch(e) {
    setSyncStatus('erro ao sincronizar', false);
  }
}

// ── RENDER ─────────────────────────────────────────────
function renderNotas(temNova) {
  const list  = document.getElementById('noteList');
  const empty = document.getElementById('emptyState');
  const count = document.getElementById('countPill');

  count.textContent = notas.length + (notas.length === 1 ? ' nota' : ' notas');

  if (notas.length === 0) {
    empty.style.display = 'flex';
    list.style.display  = 'none';
    return;
  }

  empty.style.display = 'none';
  list.style.display  = 'flex';

  list.innerHTML = notas.map((n, i) => `
    <div class="nota-card${i === 0 && temNova ? ' new' : ''}">
      <div class="nota-header">
        <div class="nota-header-left">
          <span class="nota-num">Nº ${n.numero}</span>
          <span class="nota-prestador">${n.prestador}</span>
        </div>
        <span class="nota-valor">${n.valor}</span>
      </div>
      <div class="nota-body">
        <div class="chave-text">${n.chave}</div>
        <button class="copy-btn" id="btn-${i}" onclick="copiar(${i})">
          📋 Copiar
        </button>
      </div>
      <div class="nota-footer">
        <span>${n.data_em}</span>
        <div style="display:flex;gap:6px;align-items:center;">
          ${i === 0 && temNova ? '<span class="new-badge">NOVA</span>' : ''}
          <span class="usuario-tag">👤 ${n.usuario}</span>
        </div>
      </div>
    </div>
  `).join('');
}

// ── COPIAR ──────────────────────────────────────────────
function copiar(i) {
  navigator.clipboard.writeText(notas[i].chave).then(() => {
    const btn = document.getElementById(`btn-${i}`);
    btn.className = 'copy-btn copied';
    btn.textContent = '✓ Copiado!';
    setTimeout(() => { btn.className = 'copy-btn'; btn.innerHTML = '📋 Copiar'; }, 2000);
    showToast('Chave copiada!');
  });
}

// ── HELPERS ─────────────────────────────────────────────
function setSyncStatus(text, ok) {
  document.getElementById('syncPill').className = 'pill' + (ok ? ' ok' : '');
  document.getElementById('syncDot').className  = 'pill-dot' + (ok ? ' pulse' : '');
  document.getElementById('syncText').textContent = text;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
