<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel NFS-e — Contourline</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f1f5f9; --surface: #ffffff; --surface2: #f8fafc;
    --border: #e2e8f0; --text: #0f172a; --muted: #64748b; --faint: #94a3b8;
    --green: #16a34a; --green-bg: #f0fdf4; --green-dim: #bbf7d0; --green-text: #15803d;
    --red: #dc2626;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }

  /* LOGIN */
  .login-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .login-box { width: 100%; max-width: 380px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px; display: flex; flex-direction: column; gap: 18px; box-shadow: 0 4px 24px rgba(0,0,0,0.07); }
  .login-logo { display: flex; align-items: center; gap: 12px; }
  .login-logo-mark { width: 40px; height: 40px; background: var(--green); border-radius: 10px; display: grid; place-items: center; font-size: 20px; }
  .login-title { font-size: 20px; font-weight: 700; }
  .login-sub { font-size: 13px; color: var(--muted); }
  .input-group { display: flex; flex-direction: column; gap: 6px; }
  .input-label { font-size: 12px; color: var(--muted); font-weight: 500; }
  .input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; color: var(--text); font-size: 15px; outline: none; transition: border-color 0.15s; width: 100%; }
  .input:focus { border-color: var(--green); }
  .login-btn { padding: 13px; background: var(--green); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .login-btn:hover { background: #15803d; }
  .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .login-error { color: var(--red); font-size: 12px; text-align: center; display: none; }

  /* APP */
  .app { display: none; flex-direction: column; height: 100vh; overflow: hidden; }

  /* HEADER */
  .header { flex-shrink: 0; padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-logo { width: 32px; height: 32px; background: var(--green); border-radius: 8px; display: grid; place-items: center; font-size: 16px; }
  .header-title { font-size: 16px; font-weight: 700; }
  .header-sub { font-size: 12px; color: var(--muted); }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .pill { display: flex; align-items: center; gap: 6px; font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); }
  .pill.ok { border-color: var(--green-dim); background: var(--green-bg); color: var(--green-text); }
  .pill-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .pill-dot.pulse { animation: pulse 1s ease-in-out 3; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .logout-btn { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; }
  .logout-btn:hover { color: var(--red); border-color: var(--red); }

  /* EMPTY */
  .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--faint); text-align: center; padding: 40px; }
  .empty-icon { font-size: 56px; opacity: 0.4; }
  .empty-title { font-size: 16px; font-weight: 600; color: var(--muted); }
  .empty-sub { font-size: 13px; line-height: 1.6; }

  /* LISTA */
  .list { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 16px 24px; display: flex; flex-direction: column; gap: 10px; }

  /* CARD */
  .nota-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.04); flex-shrink: 0; }
  .nota-card.new { border-color: var(--green-dim); animation: slideIn 0.3s ease; box-shadow: 0 0 0 3px var(--green-bg); }
  @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
  .nota-header { padding: 10px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .nota-num { font-size: 13px; font-weight: 700; color: var(--green-text); }
  .nota-hora { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .new-badge { background: var(--green-bg); border: 1px solid var(--green-dim); border-radius: 4px; padding: 2px 8px; font-size: 10px; font-weight: 700; color: var(--green-text); }
  .nota-body { padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
  .chave-text { font-family: monospace; font-size: 13px; color: var(--text); word-break: break-all; flex: 1; line-height: 1.5; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; }
  .copy-btn { padding: 10px 18px; background: var(--green); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .copy-btn:hover { background: #15803d; }
  .copy-btn.copied { background: #15803d; opacity: 0.85; }
  .countdown-bar-wrap { height: 3px; background: var(--border); }
  .countdown-bar { height: 3px; background: var(--green); width: 100%; transition: width 10s linear; }
  .countdown-bar.running { width: 0%; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(12px); background: var(--text); color: #fff; font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: 8px; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 200; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-mark">📄</div>
      <div>
        <div class="login-title">Painel NFS-e</div>
        <div class="login-sub">Contourline — Fiscal</div>
      </div>
    </div>
    <div class="input-group">
      <div class="input-label">Email</div>
      <input class="input" id="emailInput" type="email" placeholder="seu@contourline.com" autocomplete="email">
    </div>
    <div class="input-group">
      <div class="input-label">Senha</div>
      <input class="input" id="senhaInput" type="password" placeholder="••••••••">
    </div>
    <button class="login-btn" id="loginBtn" onclick="fazerLogin()">Entrar</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div class="app" id="app">
  <div class="header">
    <div class="header-left">
      <div class="header-logo">📄</div>
      <div>
        <div class="header-title">Painel NFS-e</div>
        <div class="header-sub" id="headerSub">Contourline</div>
      </div>
    </div>
    <div class="header-right">
      <div class="pill" id="countPill">0 notas</div>
      <div class="pill ok">
        <div class="pill-dot" id="syncDot"></div>
        <span>ao vivo</span>
      </div>
      <button class="logout-btn" onclick="fazerLogout()">Sair</button>
    </div>
  </div>

  <div class="empty" id="emptyState">
    <div class="empty-icon">📭</div>
    <div class="empty-title">Nenhuma nota pendente</div>
    <div class="empty-sub">Escaneie um QR code pelo celular<br>a chave aparece aqui em tempo real</div>
  </div>

  <div class="list" id="noteList" style="display:none;"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }                          from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, remove }      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
import { getAuth, signInWithEmailAndPassword,
         onAuthStateChanged, signOut }             from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey:            "AIzaSyCvDfXJLqcNHw98MzE5vh4FEgqyLCdlz0w",
  authDomain:        "aplicativo-nfe.firebaseapp.com",
  databaseURL:       "https://aplicativo-nfe-default-rtdb.firebaseio.com",
  projectId:         "aplicativo-nfe",
  storageBucket:     "aplicativo-nfe.firebasestorage.app",
  messagingSenderId: "763216967875",
  appId:             "1:763216967875:web:f65811332fa041bab40a76"
};

const USUARIOS = {
  'joao@contourline.com':   'João',
  'susane@contourline.com': 'Susane',
};

const app  = initializeApp(firebaseConfig);
const db   = getDatabase(app);
const auth = getAuth(app);

let usuarioAtual = '';
let notas = [];
let primeiraVez = true;
let unsubscribe = null;

// ── AUTH STATE ─────────────────────────────────────────
onAuthStateChanged(auth, (user) => {
  if (user && USUARIOS[user.email]) {
    mostrarPainel(user.email);
  } else {
    mostrarLogin();
  }
});

function mostrarLogin() {
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  notas = []; primeiraVez = true;
}

function mostrarPainel(email) {
  usuarioAtual = USUARIOS[email];
  document.getElementById('loginOverlay').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('headerSub').textContent = 'Olá, ' + usuarioAtual + ' — tempo real';
  iniciarListener();
}

// ── LOGIN ──────────────────────────────────────────────
window.fazerLogin = async function() {
  const email = document.getElementById('emailInput').value.trim();
  const senha = document.getElementById('senhaInput').value;
  const erro  = document.getElementById('loginError');
  const btn   = document.getElementById('loginBtn');
  erro.style.display = 'none';
  if (!email || !senha) { erro.style.display='block'; erro.textContent='Preencha email e senha'; return; }
  btn.disabled = true; btn.textContent = 'Entrando...';
  try {
    await signInWithEmailAndPassword(auth, email, senha);
  } catch(e) {
    erro.style.display = 'block';
    erro.textContent = 'Email ou senha incorretos';
    btn.disabled = false; btn.textContent = 'Entrar';
  }
};

window.fazerLogout = async function() {
  await signOut(auth);
};

document.getElementById('senhaInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.fazerLogin();
});

// ── LISTENER FIREBASE ──────────────────────────────────
function iniciarListener() {
  unsubscribe = onValue(ref(db, 'notas/' + usuarioAtual), (snapshot) => {
    const data = snapshot.val();
    const lista = [];
    if (data) {
      Object.entries(data).forEach(([key, val]) => lista.push({ fbKey: key, ...val }));
      lista.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    }
    const temNova = !primeiraVez && lista.length > notas.length;
    primeiraVez = false;
    notas = lista;
    renderNotas(temNova);
    if (temNova) {
      showToast('✓ Nova nota recebida!');
      const dot = document.getElementById('syncDot');
      dot.className = 'pill-dot pulse';
      setTimeout(() => dot.className = 'pill-dot', 3500);
    }
  });
}

// ── RENDER ─────────────────────────────────────────────
function renderNotas(temNova) {
  const list  = document.getElementById('noteList');
  const empty = document.getElementById('emptyState');
  document.getElementById('countPill').textContent =
    notas.length + (notas.length === 1 ? ' nota' : ' notas');

  if (notas.length === 0) {
    empty.style.display = 'flex';
    list.style.display  = 'none';
    list.innerHTML = '';
    return;
  }
  empty.style.display = 'none';
  list.style.display  = 'flex';

  // Remove cards deletados
  Array.from(list.children).forEach(el => {
    const key = el.id.replace('card-', '');
    if (!notas.find(n => n.fbKey === key)) el.remove();
  });

  // Adiciona novos no topo
  notas.forEach((n, i) => {
    if (!document.getElementById('card-' + n.fbKey)) {
      const card = criarCard(n, temNova && i === 0);
      list.insertBefore(card, list.firstChild);
    }
  });

  // Badge NOVA só no card do topo
  Array.from(list.children).forEach((el, i) => {
    const badge = el.querySelector('.new-badge');
    if (i === 0) {
      if (!badge) {
        const span = document.createElement('span');
        span.className = 'new-badge';
        span.textContent = 'NOVA';
        const headerRight = el.querySelector('.nota-header > div:last-child');
        if (headerRight) headerRight.prepend(span);
      }
    } else {
      if (badge) badge.remove();
    }
  });
}

function criarCard(n, isNova) {
  const ts   = n.timestamp ? new Date(n.timestamp) : null;
  const hora = ts ? ts.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit', second:'2-digit' }) : '—';
  const data = ts ? ts.toLocaleDateString('pt-BR') : '—';
  const k    = n.fbKey;
  const div  = document.createElement('div');
  div.className = 'nota-card' + (isNova ? ' new' : '');
  div.id = 'card-' + k;
  div.innerHTML =
    '<div class="nota-header">' +
      '<span class="nota-num">📅 ' + data + '</span>' +
      '<div style="display:flex;gap:8px;align-items:center;">' +
        (isNova ? '<span class="new-badge">NOVA</span>' : '') +
        '<span class="nota-hora">' + hora + '</span>' +
      '</div>' +
    '</div>' +
    '<div class="nota-body">' +
      '<div class="chave-text">' + (n.chave || '—') + '</div>' +
      '<button class="copy-btn" id="btn-' + k + '">📋 Copiar</button>' +
    '</div>' +
    '<div class="countdown-bar-wrap"><div class="countdown-bar" id="bar-' + k + '"></div></div>';
  div.querySelector('.copy-btn').addEventListener('click', () => copiar(k));
  return div;
}

function copiar(fbKey) {
  const nota = notas.find(n => n.fbKey === fbKey);
  if (!nota) return;
  navigator.clipboard.writeText(nota.chave).then(() => {
    const btn = document.getElementById('btn-' + fbKey);
    btn.className = 'copy-btn copied';
    btn.textContent = '✓ Copiado!';
    btn.disabled = true;
    showToast('Chave copiada! Some em 10s');
    const bar = document.getElementById('bar-' + fbKey);
    if (bar) setTimeout(() => bar.classList.add('running'), 50);
    setTimeout(() => remove(ref(db, 'notas/' + usuarioAtual + '/' + fbKey)), 10000);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
