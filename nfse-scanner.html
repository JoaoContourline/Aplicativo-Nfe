<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFS-e Scanner Pro</title>
<style>
  body { margin:0; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:monospace; color:#fff; gap:16px; padding: 20px; }
  video { width:100%; max-width:480px; height:auto; border:3px solid #333; }
  #status { font-size:16px; padding:12px; border-radius:6px; background:#222; text-align:center; width:100%; max-width:480px; }
  #result { display:none; background:#111; padding:20px; border:1px solid #0f0; width:100%; max-width:480px; border-radius:8px; text-align:center; }
  button { padding:15px 32px; font-size:16px; cursor:pointer; border:none; background:#0f0; color:#000; font-weight:bold; border-radius:4px; width:100%; max-width:480px; }
</style>
</head>
<body>

  <video id="v" autoplay muted playsinline></video>
  <div id="status">Clique em Iniciar</div>
  
  <div id="result">
    <div id="data-display" style="margin-bottom:20px; font-size: 14px; text-align: left;"></div>
    <button onclick="enviar()">ENVIAR PARA PLANILHA</button>
  </div>

  <button id="btn-init" onclick="init()">Iniciar Câmera</button>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxAfwg-jei3GEW34UAMVRwRTw0TTh652rP8So1E3ebgf1fmPRKy-2doN-rP3kJZzt_P3g/exec';
let notaDados = {};

async function init() {
  if (!('BarcodeDetector' in window)) { alert('Use Chrome ou Edge atualizado'); return; }
  const det = new BarcodeDetector({ formats: ['qr_code'] });
  document.getElementById('btn-init').style.display = 'none';
  document.getElementById('status').textContent = '📷 Abrindo câmera...';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    const v = document.getElementById('v');
    v.srcObject = stream;
    await v.play();

    async function scan() {
      const codes = await det.detect(v);
      if (codes.length > 0) {
        document.getElementById('status').textContent = '✅ QR LIDO!';
        v.style.display = 'none';
        processar(codes[0].rawValue);
      } else { setTimeout(scan, 200); }
    }
    scan();
  } catch(e) { document.getElementById('status').textContent = '❌ Erro Câmera: ' + e.message; }
}

async function processar(url) {
  document.getElementById('status').textContent = '🔍 Buscando dados...';
  try {
    // Proxy robusto para leitura externa
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxyUrl);
    const data = await res.json();
    const html = data.contents;
    
    // Filtros de extração melhorados
    const nMatch = html.match(/(?:Número|Nº|Nota|NFS-e)[^0-9]+(\d{5,15})/i);
    const vMatch = html.match(/(?:Valor|Total|Líquido)[^0-9]*(R\$\s*[\d.,]+)/i);

    notaDados = {
      n: nMatch ? nMatch[1] : "NÃO ACHEI",
      v: vMatch ? vMatch[1] : "NÃO ACHEI"
    };

    document.getElementById('data-display').innerHTML = `
      NOTA: ${notaDados.n}<br>
      VALOR: ${notaDados.v}
    `;
    document.getElementById('result').style.display = 'block';
    document.getElementById('status').textContent = 'Finalizado.';
  } catch(e) { 
    document.getElementById('status').textContent = '❌ Erro no Proxy: ' + e.message; 
  }
}

async function enviar() {
  document.getElementById('status').textContent = '🚀 Enviando...';
  const url = `${SCRIPT_URL}?n=${encodeURIComponent(notaDados.n)}&v=${encodeURIComponent(notaDados.v)}`;
  await fetch(url, { method: 'GET', mode: 'no-cors' });
  alert("✅ Sucesso!");
  location.reload();
}
</script>
</body>
</html>
