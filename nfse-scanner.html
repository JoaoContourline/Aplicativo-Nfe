<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFS-e Scanner — Contourline</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #263348;
    --border: #334155; --text: #f1f5f9; --muted: #94a3b8; --faint: #475569;
    --green: #22c55e; --green-dark: #16a34a; --green-bg: #052e16;
    --red: #ef4444; --red-bg: #450a0a; --blue: #3b82f6;
  }
  html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; }
  .wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 14px; }

  /* HEADER */
  .header { width: 100%; max-width: 480px; display: flex; align-items: center; justify-content: space-between; padding: 4px 0; }
  .header-brand { display: flex; align-items: center; gap: 10px; }
  .logo { width: 36px; height: 36px; background: var(--green-dark); border-radius: 9px; display: grid; place-items: center; font-size: 18px; }
  .brand-name { font-size: 15px; font-weight: 700; }
  .brand-sub  { font-size: 11px; color: var(--muted); }
  .user-pill  { display: none; background: var(--green-dark); color: #fff; font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 20px; }

  /* LOGIN */
  .login-card { width: 100%; max-width: 480px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .login-title { font-size: 14px; font-weight: 600; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .input-group { display: flex; flex-direction: column; gap: 6px; }
  .input-label { font-size: 12px; color: var(--muted); }
  .input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; color: var(--text); font-size: 15px; outline: none; width: 100%; }
  .input:focus { border-color: var(--green); }
  .login-btn { padding: 13px; background: var(--green-dark); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .login-erro { color: var(--red); font-size: 12px; text-align: center; display: none; }

  /* CAM */
  .cam-wrap { width: 100%; max-width: 480px; aspect-ratio: 4/3; background: #000; border-radius: 12px; overflow: hidden; position: relative; display: none; }
  .cam-wrap.visible { display: block; }
  video { width: 100%; height: 100%; object-fit: cover; display: none; }
  .cam-idle { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--faint); }
  .cam-idle-icon { font-size: 48px; opacity: 0.4; }
  .corner { position: absolute; width: 24px; height: 24px; border-color: var(--green); border-style: solid; opacity: 0; transition: opacity 0.2s; }
  .corner.show { opacity: 1; }
  #c1 { top:16px; left:16px; border-width:3px 0 0 3px; }
  #c2 { top:16px; right:16px; border-width:3px 3px 0 0; }
  #c3 { bottom:16px; left:16px; border-width:0 0 3px 3px; }
  #c4 { bottom:16px; right:16px; border-width:0 3px 3px 0; }
  .scan-line { position: absolute; left: 16px; right: 16px; height: 2px; background: var(--green); box-shadow: 0 0 8px var(--green); top: 50%; opacity: 0; transition: opacity 0.2s; animation: scanAnim 1.5s ease-in-out infinite; }
  .scan-line.show { opacity: 1; }
  @keyframes scanAnim { 0%,100%{top:20%} 50%{top:80%} }
  .flash { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .flash.show { opacity: 0.5; }

  /* STATUS */
  .status { width: 100%; max-width: 480px; padding: 12px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; display: none; background: var(--surface); border: 1px solid var(--border); color: var(--muted); }
  .status.visible { display: block; }
  .status.ok    { background: var(--green-bg); border-color: var(--green-dark); color: var(--green); }
  .status.error { background: var(--red-bg);   border-color: var(--red);        color: var(--red); }
  .status.info  { background: var(--surface);  border-color: var(--blue);       color: var(--blue); }

  /* BTNS */
  .btn-row { width: 100%; max-width: 480px; display: none; gap: 10px; }
  .btn-row.visible { display: flex; }
  .btn { flex: 1; padding: 14px; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-off  { background: var(--surface2); color: var(--text); }
  .btn-scan { background: var(--green-dark); color: #fff; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* RESULT */
  .result-card { width: 100%; max-width: 480px; background: var(--surface); border: 1px solid var(--green-dark); border-radius: 10px; overflow: hidden; display: none; }
  .result-card.show { display: block; }
  .result-header { background: var(--green-bg); padding: 10px 16px; font-size: 12px; font-weight: 700; color: var(--green); letter-spacing: 1px; text-transform: uppercase; }
  .field { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; }
  .field:last-child { border-bottom: none; }
  .field-name { font-size: 12px; color: var(--muted); width: 110px; flex-shrink: 0; padding-top: 2px; }
  .field-val  { font-size: 13px; font-weight: 500; word-break: break-all; }
  .field-val.mono { font-family: monospace; font-size: 12px; }

  /* SEND ROW */
  .send-row { width: 100%; max-width: 480px; display: none; gap: 10px; }
  .send-row.show { display: flex; }
  .btn-cancel { flex:1; padding:14px; background:var(--surface2); color:var(--text); border:none; border-radius:8px; font-size:15px; font-weight:700; cursor:pointer; }
  .btn-send   { flex:2; padding:14px; background:var(--green-dark); color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
  .btn-send:disabled { opacity:0.6; cursor:not-allowed; }

  /* HISTORY */
  .history { display: none; width: 100%; max-width: 480px; flex-direction: column; gap: 8px; }
  .history.show { display: flex; }
  .history-title { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); display: flex; justify-content: space-between; }
  .history-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; }
  .history-info { flex: 1; overflow: hidden; }
  .history-name { font-size: 12px; font-weight: 600; }
  .history-meta { font-size: 11px; color: var(--muted); font-family: monospace; }
  .tag { background: var(--green-bg); color: var(--green); font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px; white-space: nowrap; }

  .spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(12px); background:var(--text); color:var(--bg); font-size:13px; font-weight:600; padding:10px 20px; border-radius:8px; opacity:0; transition:all 0.25s; pointer-events:none; z-index:200; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-brand">
      <div class="logo">📄</div>
      <div>
        <div class="brand-name">NFS-e Scanner</div>
        <div class="brand-sub">Contourline</div>
      </div>
    </div>
    <div class="user-pill" id="userPill"></div>
  </div>

  <!-- LOGIN -->
  <div class="login-card" id="loginCard">
    <div class="login-title">Identificação</div>
    <div class="input-group">
      <div class="input-label">Email</div>
      <input class="input" id="inputEmail" type="email" placeholder="seu@contourline.com" autocomplete="email">
    </div>
    <div class="input-group">
      <div class="input-label">Senha</div>
      <input class="input" id="inputSenha" type="password" placeholder="••••••••">
    </div>
    <button class="login-btn" onclick="fazerLogin()">Entrar</button>
    <div class="login-erro" id="loginErro"></div>
  </div>

  <!-- CAM -->
  <div class="cam-wrap" id="camWrap">
    <video id="video" playsinline></video>
    <div class="cam-idle" id="camIdle">
      <div class="cam-idle-icon">📷</div>
      <div style="font-size:13px;color:var(--muted)">Câmera desligada</div>
    </div>
    <div class="corner" id="c1"></div>
    <div class="corner" id="c2"></div>
    <div class="corner" id="c3"></div>
    <div class="corner" id="c4"></div>
    <div class="scan-line" id="scanLine"></div>
    <div class="flash" id="flash"></div>
  </div>

  <div class="status" id="status"></div>

  <div class="btn-row" id="btnRow">
    <button class="btn btn-scan" id="camBtn" onclick="toggleCam()">📷 Ligar câmera</button>
    <button class="btn btn-scan" id="scanBtn" onclick="startScan()" disabled>
      <span style="font-size:18px">▣</span> Escanear QR
    </button>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-header">✓ QR lido — confirme os dados</div>
    <div id="resultBody"></div>
  </div>

  <div class="send-row" id="sendRow">
    <button class="btn-cancel" onclick="resetScan()">Cancelar</button>
    <button class="btn-send" id="sendBtn" onclick="enviar()">📤 Enviar</button>
  </div>

  <div class="history" id="history">
    <div class="history-title"><span>Enviados nesta sessão</span><span id="histCount"></span></div>
    <div id="histList"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }                        from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, push }          from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
import { getAuth, signInWithEmailAndPassword,
         onAuthStateChanged, signOut }           from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey:            "AIzaSyCvDfXJLqcNHw98MzE5vh4FEgqyLCdlz0w",
  authDomain:        "aplicativo-nfe.firebaseapp.com",
  databaseURL:       "https://aplicativo-nfe-default-rtdb.firebaseio.com",
  projectId:         "aplicativo-nfe",
  storageBucket:     "aplicativo-nfe.firebasestorage.app",
  messagingSenderId: "763216967875",
  appId:             "1:763216967875:web:f65811332fa041bab40a76"
};

const app  = initializeApp(firebaseConfig);
const db   = getDatabase(app);
const auth = getAuth(app);

// Mapa email → nome exibido e chave no banco
const USUARIOS = {
  'joao@contourline.com':   'João',
  'susane@contourline.com': 'Susane',
};

let stream, camOn = false, scanning = false, currentData = null;
let nomeUsuario = '', sessionHistory = [], enviando = false;
const video = document.getElementById('video');

// ── AUTH STATE ─────────────────────────────────────────
onAuthStateChanged(auth, (user) => {
  if (user && USUARIOS[user.email]) {
    mostrarApp(user.email);
  } else {
    mostrarLogin();
  }
});

function mostrarLogin() {
  document.getElementById('loginCard').style.display = 'flex';
  document.getElementById('camWrap').classList.remove('visible');
  document.getElementById('status').classList.remove('visible');
  document.getElementById('btnRow').classList.remove('visible');
  document.getElementById('userPill').style.display = 'none';
}

function mostrarApp(email) {
  nomeUsuario = USUARIOS[email];
  document.getElementById('loginCard').style.display = 'none';
  document.getElementById('camWrap').classList.add('visible');
  document.getElementById('status').classList.add('visible');
  document.getElementById('btnRow').classList.add('visible');
  const pill = document.getElementById('userPill');
  pill.textContent = '👤 ' + nomeUsuario;
  pill.style.display = 'block';
  setStatus('Olá, ' + nomeUsuario + '! Ligue a câmera para começar.', 'info');
}

// ── LOGIN ──────────────────────────────────────────────
window.fazerLogin = async function() {
  const email = document.getElementById('inputEmail').value.trim();
  const senha = document.getElementById('inputSenha').value;
  const erro  = document.getElementById('loginErro');
  erro.style.display = 'none';
  if (!email || !senha) { erro.style.display='block'; erro.textContent='Preencha email e senha'; return; }
  try {
    await signInWithEmailAndPassword(auth, email, senha);
  } catch(e) {
    erro.style.display = 'block';
    erro.textContent = 'Email ou senha incorretos';
  }
};

document.getElementById('inputSenha').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.fazerLogin();
});

// ── CAMERA ────────────────────────────────────────────
window.toggleCam = async function() { camOn ? stopCam() : await startCam(); };

async function startCam() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 } } });
    video.srcObject = stream; await video.play();
    camOn = true;
    video.style.display = 'block';
    document.getElementById('camIdle').style.display = 'none';
    const cb = document.getElementById('camBtn');
    cb.textContent = '✕ Desligar'; cb.className = 'btn btn-off';
    document.getElementById('scanBtn').disabled = false;
    setStatus('Câmera ativa — clique em Escanear QR', 'info');
  } catch(e) { setStatus('Erro câmera: ' + e.message, 'error'); }
}

function stopCam() {
  scanning = false;
  if (stream) stream.getTracks().forEach(t => t.stop());
  camOn = false;
  video.style.display = 'none'; video.srcObject = null;
  document.getElementById('camIdle').style.display = 'flex';
  const cb2 = document.getElementById('camBtn');
  cb2.textContent = '📷 Ligar câmera'; cb2.className = 'btn btn-scan';
  document.getElementById('scanBtn').disabled = true;
  ['c1','c2','c3','c4'].forEach(id => document.getElementById(id).classList.remove('show'));
  document.getElementById('scanLine').classList.remove('show');
  setStatus('Câmera desligada', '');
}

// ── SCAN ──────────────────────────────────────────────
window.startScan = async function() {
  if (!camOn || scanning) return;
  if (!('BarcodeDetector' in window)) { setStatus('❌ Use Chrome ou Edge atualizado', 'error'); return; }
  scanning = true;
  document.getElementById('scanBtn').disabled = true;
  ['c1','c2','c3','c4'].forEach(id => document.getElementById(id).classList.add('show'));
  document.getElementById('scanLine').classList.add('show');
  setStatus('Aponte para o QR code...', 'info');
  const det = new BarcodeDetector({ formats: ['qr_code'] });
  async function loop() {
    if (!scanning) return;
    try {
      const codes = await det.detect(video);
      if (codes.length > 0) {
        scanning = false;
        ['c1','c2','c3','c4'].forEach(id => document.getElementById(id).classList.remove('show'));
        document.getElementById('scanLine').classList.remove('show');
        const flash = document.getElementById('flash');
        flash.classList.add('show'); setTimeout(() => flash.classList.remove('show'), 400);
        await processarQR(codes[0].rawValue);
      } else { setTimeout(loop, 150); }
    } catch(e) { setTimeout(loop, 150); }
  }
  loop();
};

// ── PROCESS QR ────────────────────────────────────────
async function processarQR(url) {
  setStatus('⏳ Lendo chave da nota...', 'info');
  try {
    currentData = extrairDadosURL(url);
    if (currentData.chave === '—') throw new Error('Chave não encontrada na URL.');
    mostrarResult(currentData);
    setStatus('Dados prontos — confirme e envie', 'ok');
  } catch(e) {
    setStatus('Erro: ' + e.message, 'error');
    document.getElementById('scanBtn').disabled = false;
  }
}

function extrairDadosURL(url) {
  let chave = '—';
  try {
    const u = new URL(url);
    chave = u.searchParams.get('chave') || '—';
    if (chave === '—') {
      const m = url.match(/[?&\/]([A-Za-z0-9]{30,})/);
      if (m) chave = m[1];
    }
  } catch(e) {
    const m = url.match(/chave=([A-Za-z0-9]+)/i);
    if (m) chave = m[1];
  }
  return { chave, usuario: nomeUsuario, timestamp: Date.now(), url };
}

function mostrarResult(d) {
  const hora = new Date(d.timestamp).toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  const data = new Date(d.timestamp).toLocaleDateString('pt-BR');
  document.getElementById('resultBody').innerHTML = [
    { name: 'Data/Hora do scan', val: data + ' ' + hora, cls: '' },
    { name: 'Chave',             val: d.chave,            cls: 'mono' },
  ].map(f => '<div class="field"><div class="field-name">' + f.name + '</div><div class="field-val ' + f.cls + '">' + f.val + '</div></div>').join('');
  document.getElementById('resultCard').classList.add('show');
  document.getElementById('sendRow').classList.add('show');
}

window.resetScan = function() {
  currentData = null;
  enviando = false;
  const btn = document.getElementById('sendBtn');
  if (btn) { btn.disabled = false; btn.innerHTML = '📤 Enviar'; }
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('sendRow').classList.remove('show');
  document.getElementById('scanBtn').disabled = false;
  setStatus('Câmera ativa — clique em Escanear QR', 'info');
};

// ── ENVIAR PARA FIREBASE ───────────────────────────────
window.enviar = async function() {
  if (enviando) return;
  if (!currentData) { setStatus('Erro: nenhuma nota lida.', 'error'); return; }
  enviando = true;
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Enviando...';
  setStatus('Enviando para o painel...', 'info');
  const dadosEnvio = {
    chave:     currentData.chave,
    usuario:   currentData.usuario,
    timestamp: currentData.timestamp,
  };
  try {
    const notasRef = ref(db, 'notas/' + dadosEnvio.usuario);
    await set(push(notasRef), dadosEnvio);
    setStatus('✓ Nota enviada! Aparecerá no painel agora.', 'ok');
    showToast('✓ Enviado!');
    sessionHistory.unshift(currentData);
    renderHistory();
    setTimeout(window.resetScan, 1500);
  } catch(e) {
    setStatus('Erro ao enviar: ' + e.message, 'error');
    btn.disabled = false;
    btn.innerHTML = '📤 Enviar';
  } finally {
    enviando = false;
  }
};

function renderHistory() {
  if (!sessionHistory.length) return;
  document.getElementById('history').classList.add('show');
  document.getElementById('histCount').textContent = sessionHistory.length + ' nota(s)';
  document.getElementById('histList').innerHTML = sessionHistory.map(h => {
    const ts = new Date(h.timestamp);
    const hora = ts.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    const chaveResumida = h.chave ? h.chave.slice(0, 20) + '...' : '—';
    return '<div class="history-item"><div class="history-info"><div class="history-name">' + hora + '</div><div class="history-meta">' + chaveResumida + '</div></div><div class="tag">✓ Enviado</div></div>';
  }).join('');
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.className = 'status visible' + (type ? ' ' + type : '');
  el.innerHTML = '<span>' + msg + '</span>';
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
