function log(msg) {
  const c = document.getElementById('debug-console');
  c.innerHTML += `\n> ${msg}`;
  c.scrollTop = c.scrollHeight;
}

let currentData = null;
const html5QrCode = new Html5Qrcode("qr-reader");

// INICIALIZAÇÃO DA CÂMERA
html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, async (decodedText) => {
  log("QR Detectado!");
  document.getElementById('status').innerText = "Processando dados da nota...";
  try {
    await html5QrCode.stop();
    await processNFSe(decodedText);
  } catch (e) {
    log("Erro ao parar câmera: " + e.message);
  }
}).catch(err => log("Erro Câmera: " + err));

async function processNFSe(url) {
  try {
    log("Buscando conteúdo da nota...");
    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
    const response = await fetch(proxyUrl);
    const html = await response.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const b = doc.body.innerText;

    // Extrator de dados (Regex)
    currentData = {
      numero: b.match(/Número da NFS-e\s*\n\s*(\d+)/)?.[1] || "—",
      data: b.match(/Data e Hora de Emissão da NFS-e\s*\n\s*([\d\/]+)/)?.[1] || "—",
      prestador: b.match(/Nome \/ Nome Empresarial\s*\n\s*([^\n]+)/)?.[1] || "—",
      valor: b.match(/Valor Líquido da NFS-e\s*\n\s*(R\$\s*[\d.,]+)/)?.[1] || "—",
      chave: b.match(/Chave de Acesso da NFS-e\s*\n\s*([A-Za-z0-9]+)/)?.[1] || "—"
    };

    if(currentData.numero === "—") {
        log("Aviso: Alguns dados não foram encontrados no texto.");
    }

    document.getElementById('previewBody').innerHTML = `
      <b>Prestador:</b> ${currentData.prestador}<br>
      <b>Nº Nota:</b> ${currentData.numero}<br>
      <b>Valor:</b> <span style="color:#22c55e">${currentData.valor}</span>
    `;
    document.getElementById('previewCard').style.display = 'block';
    document.getElementById('status').innerText = "Leitura concluída!";
    log("Dados prontos para envio.");
  } catch (e) {
    log("Erro no processamento: " + e.message);
    document.getElementById('status').innerText = "Erro ao ler dados da URL.";
  }
}

async function sendToSheets() {
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.innerText = "AUTENTICANDO...";
  log("Iniciando assinatura Google JWT...");

  try {
    const now = Math.floor(Date.now() / 1000);
    const sHeader = JSON.stringify({alg: "RS256", typ: "JWT"});
    const sPayload = JSON.stringify({
      iss: SERVICE_ACCOUNT.email,
      scope: "https://www.googleapis.com/auth/spreadsheets",
      aud: "https://oauth2.googleapis.com/token",
      iat: now - 30, // Margem para relógio dessincronizado
      exp: now + 3600
    });

    // Assinatura com a biblioteca jsrsasign
    const sJWT = KJUR.jws.JWS.sign(null, sHeader, sPayload, SERVICE_ACCOUNT.key);
    
    log("JWT assinado. Buscando Token...");
    const r = await fetch('https://oauth2.googleapis.com/token', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: `grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${sJWT}`
    });

    const res = await r.json();
    if(res.error) {
        log("ERRO GOOGLE: " + res.error_description);
        btn.disabled = false;
        btn.innerText = "TENTAR NOVAMENTE";
        return;
    }

    log("Token OK! Gravando na planilha...");
    const sheetUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/NFS-e!A:H:append?valueInputOption=USER_ENTERED`;
    const appendR = await fetch(sheetUrl, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + res.access_token, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        values: [[
          currentData.numero, currentData.data, currentData.prestador, 
          "", currentData.valor, "", currentData.chave, new Date().toLocaleString()
        ]]
      })
    });

    if(appendR.ok) {
        log("SUCESSO: Nota salva!");
        alert("✅ Gravado com sucesso na planilha!");
        location.reload();
    } else {
        const errData = await appendR.json();
        log("Erro Sheets: " + errData.error.message);
    }

  } catch (e) {
    log("Erro crítico: " + e.message);
  }
  btn.disabled = false;
  btn.innerText = "ENVIAR AO SHEETS";
}
