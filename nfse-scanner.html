<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NFS-e Pro Scanner</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root { --bg: #09090b; --green: #22c55e; }
  body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 15px; margin: 0; }
  #qr-reader { width: 100%; border: 2px solid var(--green); border-radius: 16px; overflow: hidden; background: #000; }
  .btn { width: 100%; padding: 18px; background: var(--green); border: none; border-radius: 12px; font-weight: 800; margin-top: 15px; }
  #debug-console { margin-top: 15px; background: #000; color: #4ade80; font-family: monospace; font-size: 10px; padding: 10px; height: 120px; overflow-y: auto; border: 1px solid #333; }
</style>
</head>
<body>

  <h3>Pro Scanner (Direct Link)</h3>
  <div id="qr-reader"></div>
  <div id="preview" style="display:none; background:#18181b; padding:15px; border-radius:12px; margin-top:10px;">
    <div id="data"></div>
    <button class="btn" id="sendBtn" onclick="sendToSheets()">ENVIAR NOTA</button>
  </div>
  <div id="debug-console">--- SISTEMA PRONTO ---</div>

<script>
// AQUI VAI A SUA URL QUE VOCÊ ME MANDOU
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzlW0T2YW-M1V3HAbZ5yt3q0AVhcA9uGeR3QIQ-uvzGaTxd0Uud2b0vbjpGdbvIkRUvkA/exec';

function log(m) { const c = document.getElementById('debug-console'); c.innerHTML += `\n> ${m}`; c.scrollTop = c.scrollHeight; }

const html5QrCode = new Html5Qrcode("qr-reader");
html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 200 }, (text) => {
  html5QrCode.stop();
  fetchData(text);
});

async function fetchData(url) {
  try {
    log("Lendo nota...");
    const r = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
    const b = await r.text();
    const doc = new DOMParser().parseFromString(b, 'text/html').body.innerText;
    window.nota = {
      n: doc.match(/Número da NFS-e\s*\n\s*(\d+)/)?.[1] || "—",
      v: doc.match(/Valor Líquido da NFS-e\s*\n\s*(R\$\s*[\d.,]+)/)?.[1] || "—",
      p: doc.match(/Nome \/ Nome Empresarial\s*\n\s*([^\n]+)/)?.[1] || "—",
      c: doc.match(/Chave de Acesso da NFS-e\s*\n\s*([A-Za-z0-9]+)/)?.[1] || "—"
    };
    document.getElementById('data').innerHTML = `<b>Nota:</b> ${window.nota.n}<br><b>Valor:</b> ${window.nota.v}`;
    document.getElementById('preview').style.display = 'block';
  } catch(e) { log("Erro busca: " + e.message); }
}

async function sendToSheets() {
  log("Enviando via Script...");
  try {
    const r = await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors', // Isso ignora o bloqueio de navegador
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(window.nota)
    });
    log("Enviado com sucesso!");
    alert("Nota gravada na planilha!");
    location.reload();
  } catch(e) { log("Erro: " + e.message); }
}
</script>
</body>
</html>
