<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFS-e Scanner</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  body { background: #09090b; color: #fff; font-family: sans-serif; padding: 20px; }
  #qr-reader { width: 100%; border: 2px solid #22c55e; border-radius: 12px; overflow: hidden; }
  .btn { width: 100%; padding: 15px; background: #22c55e; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
</style>
</head>
<body>

  <div id="qr-reader"></div>
  <div id="preview" style="display:none; margin-top:20px;">
    <div id="data"></div>
    <button class="btn" onclick="sendToSheets()">ENVIAR PARA PLANILHA</button>
  </div>
  <div id="log" style="font-size:10px; color:#666; margin-top:20px;"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzlW0T2YW-M1V3HAbZ5yt3q0AVhcA9uGeR3QIQ-uvzGaTxd0Uud2b0vbjpGdbvIkRUvkA/exec';

const html5QrCode = new Html5Qrcode("qr-reader");
// Esta configuração de leitura é a que você disse que estava "perfeita"
html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
  html5QrCode.stop();
  fetchData(text);
});

async function fetchData(url) {
  document.getElementById('log').innerText = "Processando...";
  const r = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
  const b = await r.text();
  const doc = new DOMParser().parseFromString(b, 'text/html').body.innerText;
  window.nota = {
    n: doc.match(/Número da NFS-e\s*\n\s*(\d+)/)?.[1] || "—",
    v: doc.match(/Valor Líquido da NFS-e\s*\n\s*(R\$\s*[\d.,]+)/)?.[1] || "—",
    p: doc.match(/Nome \/ Nome Empresarial\s*\n\s*([^\n]+)/)?.[1] || "—",
    c: doc.match(/Chave de Acesso da NFS-e\s*\n\s*([A-Za-z0-9]+)/)?.[1] || "—"
  };
  document.getElementById('data').innerHTML = `Nota: ${window.nota.n}<br>Valor: ${window.nota.v}`;
  document.getElementById('preview').style.display = 'block';
}

async function sendToSheets() {
  await fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(window.nota)
  });
  alert("Sucesso!");
  location.reload();
}
</script>
</body>
</html>
