<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { background: #09090b; color: white; font-family: sans-serif; padding: 10px; margin: 0; }
        #qr-reader { width: 100%; height: 300px; border: 2px solid #22c55e; border-radius: 10px; }
        .hidden { display: none; }
        .card { background: #18181b; padding: 15px; border-radius: 10px; margin-top: 15px; }
        button { width: 100%; padding: 15px; background: #22c55e; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <h2 id="titulo">Scanner NFS-e</h2>
    <div id="qr-reader"></div>

    <div id="resultado" class="card hidden">
        <p id="texto-nota"></p>
        <button onclick="enviar()">ENVIAR DADOS</button>
    </div>

    <div id="status" style="margin-top:10px; font-size:12px; color:yellow;">Iniciando...</div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxAfwg-jei3GEW34UAMVRwRTw0TTh652rP8So1E3ebgf1fmPRKy-2doN-rP3kJZzt_P3g/exec';
        let dadosNota = {};

        function iniciarScanner() {
            const html5QrCode = new Html5Qrcode("qr-reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
                (decodedText) => {
                    html5QrCode.stop();
                    document.getElementById('status').innerText = "Processando...";
                    processarNota(decodedText);
                }
            ).catch(err => {
                document.getElementById('status').innerText = "Erro ao iniciar câmera: " + err;
            });
        }

        async function processarNota(url) {
            try {
                const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
                const html = await res.text();
                const doc = new DOMParser().parseFromString(html, 'text/html').body.innerText;
                
                dadosNota = {
                    n: doc.match(/Número da NFS-e\s*\n\s*(\d+)/)?.[1] || "—",
                    v: doc.match(/Valor Líquido da NFS-e\s*\n\s*(R\$\s*[\d.,]+)/)?.[1] || "—",
                    p: doc.match(/Nome \/ Nome Empresarial\s*\n\s*([^\n]+)/)?.[1] || "—",
                    c: doc.match(/Chave de Acesso da NFS-e\s*\n\s*([A-Za-z0-9]+)/)?.[1] || "—"
                };

                document.getElementById('texto-nota').innerHTML = `Nota: ${dadosNota.n}<br>Valor: ${dadosNota.v}`;
                document.getElementById('resultado').classList.remove('hidden');
                document.getElementById('status').innerText = "Leitura realizada.";
            } catch(e) {
                document.getElementById('status').innerText = "Erro de leitura: " + e.message;
            }
        }

        async function enviar() {
            const fd = new FormData();
            for(let key in dadosNota) fd.append(key, dadosNota[key]);
            
            await fetch(SCRIPT_URL, { method: 'POST', body: fd });
            alert("Enviado!");
            location.reload();
        }

        window.onload = iniciarScanner;
    </script>
</body>
</html>
