<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner NFS-e</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { background: #09090b; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        #qr-reader { width: 100%; min-height: 250px; border: 2px solid #22c55e; border-radius: 10px; background: #000; }
        .btn { width: 100%; padding: 20px; background: #22c55e; border: none; border-radius: 10px; font-weight: bold; margin-top: 15px; color: black; }
    </style>
</head>
<body>

    <h2>Scanner NFS-e</h2>
    <div id="qr-reader"></div>
    <div id="status" style="margin-top:15px; color:#aaa;">Clique no botão abaixo para iniciar</div>
    <button class="btn" onclick="iniciar()">LIGAR CÂMERA</button>

    <div id="res" style="display:none; margin-top:20px;">
        <p id="info" style="color:white;"></p>
        <button class="btn" style="background:#007bff; color:white;" onclick="enviar()">ENVIAR PARA PLANILHA</button>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxAfwg-jei3GEW34UAMVRwRTw0TTh652rP8So1E3ebgf1fmPRKy-2doN-rP3kJZzt_P3g/exec';
        let notaDados = {};

        function iniciar() {
            const html5QrCode = new Html5Qrcode("qr-reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (t) => {
                html5QrCode.stop();
                document.getElementById('status').innerText = "Lido! Processando...";
                processar(t);
            });
        }

        async function processar(url) {
            try {
                const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
                const html = await res.text();
                const doc = new DOMParser().parseFromString(html, 'text/html').body.innerText;
                notaDados = {
                    n: doc.match(/Número da NFS-e\s*\n\s*(\d+)/)?.[1] || "—",
                    v: doc.match(/Valor Líquido da NFS-e\s*\n\s*(R\$\s*[\d.,]+)/)?.[1] || "—"
                };
                document.getElementById('info').innerHTML = `Nota: ${notaDados.n}<br>Valor: ${notaDados.v}`;
                document.getElementById('res').style.display = 'block';
                document.getElementById('status').innerText = "Dados extraídos.";
            } catch(e) { document.getElementById('status').innerText = "Erro: " + e.message; }
        }

        async function enviar() {
            document.getElementById('status').innerText = "Enviando...";
            // O segredo para não dar "Failed to fetch": modo no-cors
            await fetch(`${SCRIPT_URL}?n=${encodeURIComponent(notaDados.n)}&v=${encodeURIComponent(notaDados.v)}`, {
                method: 'GET',
                mode: 'no-cors'
            });
            alert("Sucesso!");
            location.reload();
        }
    </script>
</body>
</html>
