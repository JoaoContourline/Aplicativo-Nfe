function log(m) { const c = document.getElementById('debug-console'); c.innerHTML += `\n> ${m}`; c.scrollTop = c.scrollHeight; }

const html5QrCode = new Html5Qrcode("qr-reader");
html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 200 }, (text) => {
  html5QrCode.stop();
  fetchData(text);
});

async function fetchData(url) {
  try {
    log("Buscando URL...");
    const r = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
    const h = await r.text();
    const b = new DOMParser().parseFromString(h, 'text/html').body.innerText;
    window.nota = {
      n: b.match(/Número da NFS-e\s*\n\s*(\d+)/)?.[1] || "—",
      v: b.match(/Valor Líquido da NFS-e\s*\n\s*(R\$\s*[\d.,]+)/)?.[1] || "—",
      p: b.match(/Nome \/ Nome Empresarial\s*\n\s*([^\n]+)/)?.[1] || "—",
      c: b.match(/Chave de Acesso da NFS-e\s*\n\s*([A-Za-z0-9]+)/)?.[1] || "—"
    };
    document.getElementById('data').innerHTML = `<b>Nota:</b> ${window.nota.n}<br><b>Valor:</b> ${window.nota.v}`;
    document.getElementById('preview').style.display = 'block';
  } catch(e) { log("Erro busca: " + e.message); }
}

async function sendToSheets() {
  log("Autenticando...");
  try {
    const now = Math.floor(Date.now() / 1000);
    const sJWT = KJUR.jws.JWS.sign(null, JSON.stringify({alg: "RS256", typ: "JWT"}), 
      JSON.stringify({iss: SERVICE_ACCOUNT.email, scope: "https://www.googleapis.com/auth/spreadsheets", aud: "https://oauth2.googleapis.com/token", iat: now-60, exp: now+3600}), 
      SERVICE_ACCOUNT.key);
      
    const r = await fetch('https://oauth2.googleapis.com/token', {method: 'POST', body: `grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${sJWT}`});
    const res = await r.json();
    
    if(res.access_token) {
      log("Token recebido. Enviando...");
      const appendR = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/NFS-e!A:H:append?valueInputOption=USER_ENTERED`, {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + res.access_token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ values: [[window.nota.n, "", window.nota.p, "", window.nota.v, "", window.nota.c, new Date().toLocaleString()]] })
      });
      const appendData = await appendR.json();
      if(appendR.ok) { log("Sucesso!"); alert("Gravado!"); location.reload(); }
      else { log("Erro Sheets: " + JSON.stringify(appendData)); }
    } else {
      log("Erro Auth: " + JSON.stringify(res));
    }
  } catch(e) { log("Erro final: " + e.toString()); }
}
