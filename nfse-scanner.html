<style>
  @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;700&family=Geist:wght@400;700&display=swap');
  :root { --bg: #09090b; --surface: #18181b; --border: #3f3f46; --text: #fafafa; --green: #22c55e; --red: #ef4444; }
  body { background: var(--bg); color: var(--text); font-family: 'Geist', sans-serif; padding: 15px; margin: 0; }
  #qr-reader { width: 100%; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: #000; }
  .status { margin: 10px 0; padding: 10px; border-radius: 8px; font-size: 13px; background: var(--surface); border: 1px solid var(--border); }
  .preview { background: var(--surface); padding: 15px; border-radius: 10px; border: 1px solid var(--border); margin-top: 15px; display: none; }
  .btn { width: 100%; padding: 15px; background: var(--green); color: #000; border: none; border-radius: 8px; font-weight: 800; margin-top: 10px; cursor: pointer; }
  
  /* CONSOLE DE DEBUG NA TELA */
  #debug-console { 
    margin-top: 20px; background: #000; color: #4ade80; font-family: 'Geist Mono', monospace; 
    font-size: 10px; padding: 10px; border: 1px solid var(--border); height: 180px; 
    overflow-y: auto; white-space: pre-wrap; border-radius: 8px;
  }
  .log-err { color: #f87171; }
  .log-warn { color: #fbbf24; }

function log(msg, type = '') {
  const consoleEl = document.getElementById('debug-console');
  const timestamp = new Date().toLocaleTimeString();
  const colorClass = type ? `class="log-${type}"` : '';
  consoleEl.innerHTML += `\n<span ${colorClass}>[${timestamp}] ${msg}</span>`;
  consoleEl.scrollTop = consoleEl.scrollHeight;
}

let currentData = null;
const html5QrCode = new Html5Qrcode("qr-reader");

// Inicia Câmera
html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, async (text) => {
  log("QR Code detectado!");
  await html5QrCode.stop();
  document.getElementById('status').innerText = "Processando nota...";
  fetchData(text);
}).catch(err => log("Erro câmera: " + err, "err"));

async function fetchData(url) {
  try {
    log("Buscando dados via Proxy...");
    const r = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`);
    const html = await r.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const text = doc.body.innerText;
    
    currentData = {
      numero: text.match(/Número da NFS-e\s*\n\s*(\d+)/)?.[1] || "—",
      data: text.match(/Data e Hora de Emissão da NFS-e\s*\n\s*([\d\/]+)/)?.[1] || "—",
      prestador: text.match(/Nome \/ Nome Empresarial\s*\n\s*([^\n]+)/)?.[1] || "—",
      valor: text.match(/Valor Líquido da NFS-e\s*\n\s*(R\$\s*[\d.,]+)/)?.[1] || "—",
      chave: text.match(/Chave de Acesso da NFS-e\s*\n\s*([A-Za-z0-9]+)/)?.[1] || "—"
    };

    document.getElementById('previewBody').innerHTML = `
      <b>Prestador:</b> ${currentData.prestador}<br>
      <b>Nº Nota:</b> ${currentData.numero} | <b>Valor:</b> ${currentData.valor}
    `;
    document.getElementById('previewCard').style.display = 'block';
    log("Leitura concluída com sucesso.");
  } catch(e) { 
    log("Erro ao processar HTML: " + e.message, "err"); 
  }
}

async function sendToSheets() {
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.innerText = "AUTENTICANDO...";
  log("Gerando Assinatura JWT...");

  try {
    const now = Math.floor(Date.now() / 1000);
    const header = JSON.stringify({ alg: 'RS256', typ: 'JWT' });
    const payload = JSON.stringify({
      iss: SERVICE_ACCOUNT.client_email,
      scope: 'https://www.googleapis.com/auth/spreadsheets',
      aud: 'https://oauth2.googleapis.com/token',
      iat: now - 30, // Margem de segurança para o relógio
      exp: now + 3600
    });

    const jwt = KJUR.jws.JWS.sign('RS256', header, payload, SERVICE_ACCOUNT.private_key);
    log("Assinatura OK. Solicitando Access Token...");

    const r = await fetch('https://oauth2.googleapis.com/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: `grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${jwt}`
    });

    const tokenData = await r.json();
    
    if (tokenData.error) {
      log("ERRO GOOGLE: " + tokenData.error, "err");
      log("MOTIVO: " + (tokenData.error_description || "Desconhecido"), "err");
      btn.disabled = false;
      btn.innerText = "TENTAR NOVAMENTE";
      return;
    }

    log("Token recebido! Gravando na planilha...");
    
    const sheetUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/NFS-e!A:H:append?valueInputOption=USER_ENTERED`;
    const appendR = await fetch(sheetUrl, {
      method: 'POST',
      headers: { 
        Authorization: 'Bearer ' + tokenData.access_token,
        'Content-Type': 'application/json' 
      },
      body: JSON.stringify({
        values: [[
          currentData.numero, currentData.data, currentData.prestador, 
          "", currentData.valor, "", currentData.chave, new Date().toLocaleString()
        ]]
      })
    });

    if (appendR.ok) {
      log("SUCESSO! Nota gravada na planilha.", "ok");
      alert("✅ Gravado com sucesso!");
      location.reload(); 
    } else {
      const errRes = await appendR.json();
      log("ERRO AO GRAVAR: " + errRes.error.message, "err");
    }

  } catch(e) {
    log("ERRO NO CÓDIGO: " + e.message, "err");
  }
  btn.disabled = false;
  btn.innerText = "ENVIAR AO GOOGLE SHEETS";
}
